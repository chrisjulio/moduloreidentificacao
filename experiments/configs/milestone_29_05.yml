# ============================================================
# Configuração do Marco 29/05 — k-Anonimato Estrutural
# Sanidade k=5, d=1 sobre ego-rede 3437 do Facebook (SNAP)
# ============================================================
#
# Este arquivo aciona o script experiments/run_milestone_29_05.py.
# Critério de aceite: issue #16, decisão DL-01 (docs/decision_log.md).

experiment:
  name: milestone_29_05
  description: >
    Marco não-negociável de 29/05/2026. Verifica empiricamente que
    anonymize(G, k=5, d=1, seed) produz grupos com k-anonimato estrutural
    válido (ou parcialmente válido sob D-06) nas 3 sementes, sobre a
    ego-rede 3437 do Facebook Ego-Nets (n_lcc=532, m_lcc=4812).
  output_dir: results/milestone_29_05

# ------------------------------------------------------------
# Sementes (mínimo 3 por .claude/rules/seeds.md)
# ------------------------------------------------------------
seeds: [42, 1337, 2718]

# ------------------------------------------------------------
# Dataset
# ------------------------------------------------------------
dataset:
  name: facebook_ego_nets
  source: snap
  data_path: data/raw/facebook/
  preprocessing_mode: single_egonet
  egonet_id: 3437       # n_lcc=532, m_lcc=4812, density=0.034068 (issue #40)
  include_ego: false    # nó ego excluído (decisão Seção 3.1)
  component: lcc        # reter maior componente conexo (decisão Seção 3.2)
  min_nodes: 200        # limiar de sanidade (10 * k_max = 10 * 20 = 200)

# ------------------------------------------------------------
# Anonimização
# ------------------------------------------------------------
anonymization:
  algorithm: he_2009
  k: 5
  d: 1
  sigma: 0.5            # suporte mínimo do FSM simplificado (D-01)

# ------------------------------------------------------------
# Validação
# ------------------------------------------------------------
validation:
  validate_k_anonymity: true
  log_dir: experiments/logs/milestone_29_05/
  # Critério de aceite (DL-01 / D-06):
  #   sucesso_pleno:    valid=True  e violations=[]
  #   sucesso_parcial:  valid=False apenas por incomplete_group E satisfied_fraction >= 0.9
  #   falha:            qualquer non_isomorphic, non_disjoint, ou satisfied_fraction < 0.9

# ------------------------------------------------------------
# Execução
# ------------------------------------------------------------
runtime:
  log_level: INFO
  log_dir: experiments/logs/
