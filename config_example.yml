# ============================================================
# Configuração experimental — exemplo
# Baseline de Reidentificação em Redes Sociais Anonimizadas
# ============================================================
#
# Este arquivo é referência. Para uma execução específica:
#   1. Copie para experiments/configs/<nome_do_experimento>.yml
#   2. Ajuste os parâmetros conforme o desenho experimental
#   3. Versione o arquivo final junto aos resultados que ele produzir

experiment:
  name: example_baseline_he2009
  description: >
    Execução de referência aplicando He et al. (2009) sobre uma ego-rede do
    Facebook Ego-Nets, com ataques por grau e por subgrafos.
  output_dir: results/example_baseline_he2009

# ------------------------------------------------------------
# Sementes aleatórias
# ------------------------------------------------------------
# Mínimo de 3 sementes por configuração para barras de erro.
# n_runs_por_configuracao = len(seeds); cada run usa uma semente distinta.
seeds: [42, 1337, 2718]

# ------------------------------------------------------------
# Dataset
# ------------------------------------------------------------
dataset:
  name: facebook_ego_nets
  source: snap
  data_path: data/processed/facebook/

  # Modo de pré-processamento (cf. docs/preprocessing_decision.md, Seção 1).
  #   - single_egonet:    desenvolvimento e marco de 29/05 (este exemplo)
  #   - multiple_egonets: experimentos finais (Semana 3+)
  # O modo union foi descartado (ver Seção 2 da decisão).
  preprocessing_mode: single_egonet

  # Usado apenas quando preprocessing_mode == single_egonet.
  # Selecionado em issue #40: ego-rede de tamanho mediano entre as 6 que
  # passam n_lcc >= 200 (sorted: 224, 324, 532*, 744, 775, 1034).
  egonet_id: 3437  # n_lcc=532, m_lcc=4812, density=0.034068

  # Usado apenas quando preprocessing_mode == multiple_egonets.
  # Redes com n_lcc >= 200 (issue #40): 348, 0, 3437, 1912, 1684, 107.
  egonet_ids: [348, 0, 3437, 1912, 1684, 107]

  # Sub-decisões de pré-processamento (docs/preprocessing_decision.md, Seção 3).
  include_ego: false   # Seção 3.1 — nó ego excluído
  component: lcc       # Seção 3.2 — reter maior componente conexo
  min_nodes: 200       # Seção 3.3 — limiar = 10 * k_max; confirmar na Semana 1.
                       # Use 0 ou null para desabilitar em YAMLs de desenvolvimento.

  # Alternativa contingente (nível Desejável):
  # name: email_enron
  # source: snap
  # data_path: data/processed/enron/
  # treat_as_undirected: true

# ------------------------------------------------------------
# Anonimização
# ------------------------------------------------------------
anonymization:
  algorithm: he_2009
  k_values: [2, 5, 10, 20]
  # Validação obrigatória pré-experimento (cf. Seção 7 do plano operacional):
  # confirmar empiricamente que o k-anonimato pretendido é atingido.
  # Se falhar para algum k, os resultados associados são inválidos.
  validate_k_anonymity: true

  # Aspiracional: anonimização secundária para comparação no mesmo gráfico
  # algorithm: nettleton_salas_2016
  # t_closeness: 0.2

# ------------------------------------------------------------
# Ataques
# ------------------------------------------------------------
attacks:
  - type: degree
    tolerance: 0  # casamento de grau; 0 = exato
  - type: subgraph
    hop_distance: 1  # vizinhança k-hop; 1 na primeira iteração
    # Atenção: custo computacional cresce rapidamente com hop_distance
    isomorphism_backend: vf2  # via NetworkX

  # Aspiracional: derivado dos grupos de equivalência já calculados
  # - type: entropy

# ------------------------------------------------------------
# Métricas
# ------------------------------------------------------------
metrics:
  privacy:
    - reidentification_rate           # N_correto / N_total, por ataque
    - equivalence_group_size          # tamanho médio e mediano dos grupos
  utility:
    - ks_test_degree_distribution     # estatística D como métrica primária
    - clustering_coefficient_variation  # |C_anon - C_orig| / C_orig

# ------------------------------------------------------------
# Execução
# ------------------------------------------------------------
runtime:
  parallel: false        # paralelismo desativado por padrão
  log_level: INFO
  log_dir: experiments/logs/
